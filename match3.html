<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>三消遊戲</title>
  <style>
    body { text-align: center; font-family: Arial; }
    #board { 
      display: grid; 
      grid-template-columns: repeat(8, 50px); 
      grid-template-rows: repeat(8, 50px); 
      gap: 2px; 
      margin: 20px auto; 
      width: max-content;
    }
    .cell {
      width: 50px; height: 50px;
      display: flex; justify-content: center; align-items: center;
      font-size: 24px; font-weight: bold;
      background: #eee; border-radius: 5px;
      cursor: pointer;
    }
    #score, #moves {
      font-size: 20px; font-weight: bold; margin-top: 10px;
    }
    #message {
      font-size: 22px; font-weight: bold; margin-top: 20px; color: red;
    }
  </style>
</head>
<body>
  <h1>三消遊戲</h1>
  <div id="score">分數：0</div>
  <div id="moves">剩餘步數：20</div>
  <div id="board"></div>
  <div id="message"></div>
  <script>
    const board = document.getElementById("board");
    const size = 8;
    const colors = ["🍎","🍋","🍇","🍒","🥝"];
    let grid = [];
    let score = 0;
    let moves = 20; // 初始步數限制
    const targetScore = 200; // 過關目標分數

    function updateScore(points) {
      score += points;
      document.getElementById("score").innerText = "分數：" + score;
    }

    function updateMoves() {
      moves--;
      document.getElementById("moves").innerText = "剩餘步數：" + moves;
      if (moves <= 0) endGame();
    }

    function init() {
      grid = [];
      board.innerHTML = "";
      for (let i=0; i<size*size; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;
        cell.textContent = colors[Math.floor(Math.random()*colors.length)];
        cell.addEventListener("click", selectCell);
        board.appendChild(cell);
        grid.push(cell);
      }
    }

    let first = null;
    function selectCell(e) {
      if (!first) {
        first = e.target;
        first.style.border = "2px solid red";
      } else {
        swap(first, e.target);
        first.style.border = "";
        first = null;
        updateMoves(); // 每次交換算一步
        checkMatches();
      }
    }

    function swap(a, b) {
      let tmp = a.textContent;
      a.textContent = b.textContent;
      b.textContent = tmp;
    }

    function checkMatches() {
      let matched = [];
      // 橫向檢查
      for (let r=0; r<size; r++) {
        for (let c=0; c<size-2; c++) {
          let i = r*size+c;
          if (grid[i].textContent === grid[i+1].textContent &&
              grid[i].textContent === grid[i+2].textContent &&
              grid[i].textContent !== "") {
            matched.push(i, i+1, i+2);
          }
        }
      }
      // 縱向檢查
      for (let c=0; c<size; c++) {
        for (let r=0; r<size-2; r++) {
          let i = r*size+c;
          if (grid[i].textContent === grid[i+size].textContent &&
              grid[i].textContent === grid[i+2*size].textContent &&
              grid[i].textContent !== "") {
            matched.push(i, i+size, i+2*size);
          }
        }
      }
      matched = [...new Set(matched)];
      if (matched.length > 0) {
        updateScore(matched.length * 10); // 每消除一格加 10 分
        matched.forEach(i => {
          grid[i].textContent = ""; // 清空格子
        });
        dropElements();
        setTimeout(checkMatches, 300); // 連鎖檢查
      }
    }

    function dropElements() {
      for (let c=0; c<size; c++) {
        let empty = [];
        for (let r=size-1; r>=0; r--) {
          let i = r*size+c;
          if (grid[i].textContent === "") {
            empty.push(i);
          } else if (empty.length > 0) {
            let target = empty.shift();
            grid[target].textContent = grid[i].textContent;
            grid[i].textContent = "";
            empty.push(i);
          }
        }
        // 最上方補新元素
        empty.forEach(i => {
          grid[i].textContent = colors[Math.floor(Math.random()*colors.length)];
        });
      }
    }

    function endGame() {
      let message = document.getElementById("message");
      if (score >= targetScore) {
        message.innerText = "🎉 恭喜過關！分數：" + score;
      } else {
        message.innerText = "❌ 遊戲失敗，分數：" + score;
      }
      // 停止操作
      grid.forEach(cell => cell.removeEventListener("click", selectCell));
    }

    init();
  </script>
</body>
</html>
